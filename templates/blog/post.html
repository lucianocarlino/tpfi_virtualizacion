{% extends 'blog/base.html' %}
{% block title %}{{ post.titulo }}{% endblock %}

{% block extra_css %}
<style>
    .back { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--muted); text-decoration: none; font-size: 0.85rem; margin-bottom: 2.5rem; transition: color 0.2s; }
    .back:hover { color: var(--accent); }
    .post-header { margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .post-header h1 { font-family: var(--font-display); font-size: 2.2rem; line-height: 1.2; margin: 0.8rem 0; }
    .post-meta { font-size: 0.8rem; color: var(--muted); }
    .post-body { font-size: 1rem; line-height: 1.9; color: #ccc; white-space: pre-wrap; }
</style>
{% endblock %}

{% block content %}
<a href="/43708688/" class="back">← Volver al inicio</a>
<article>
    <header class="post-header">
        <span class="tag">Post</span>
        <h1>{{ post.titulo }}</h1>
        <p class="post-meta">Publicado el {{ post.fecha|date:"d de F, Y" }}</p>
    </header>
    <div class="post-body">{{ post.contenido }}</div>
</article>
{% endblock %}
